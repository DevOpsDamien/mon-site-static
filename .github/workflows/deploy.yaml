name: Build and Deploy to K3s

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, lab, AMD64]

    steps:
    # 1) Récupérer le code du repo
    - name: Check out code
      uses: actions/checkout@v4

    # 2) Configurer QEMU pour build multi-arch
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    # 3) Configurer Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # 4) Login to Docker Hub (NOUVELLE MÉTHODE)
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5) Build + Push image multi-arch sur Docker Hub
    - name: Build and Push Docker Image (Multi-Arch)
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64  # Construction multi-arch
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/mon-site:${{ github.sha }}

    - name: Set up kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

    - name: Check cluster connection
      run: kubectl cluster-info
      
    # 6) Déployer sur K3s : maj du Deployment
    - name: Deploy to K3s
      run: |
        kubectl --request-timeout=120s set image deployment/mon-site-deploy \
          mon-site-container=${{ secrets.DOCKERHUB_USERNAME }}/mon-site:${{ github.sha }} -n default
        kubectl rollout restart deployment mon-site-deploy
